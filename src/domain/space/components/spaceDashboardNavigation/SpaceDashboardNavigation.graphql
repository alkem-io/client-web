query SpaceDashboardNavigationSubspaces($spaceId: UUID!) {
  lookup {
    space(ID: $spaceId) {
      id
      authorization {
        id
        myPrivileges
      }
      about {
        ...SpaceAboutCardBanner
        isContentPublic
      }
      settings {
        sortMode
      }
      subspaces {
        id
        sortOrder
        pinned
        about {
          ...SpaceAboutCardAvatar
          isContentPublic
          membership {
            myMembershipStatus
          }
        }
        authorization {
          id
          myPrivileges
        }
      }
    }
  }
}
