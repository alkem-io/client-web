query MentionableContributors($spaceID: UUID!, $filter: ContributorFilterInput, $limit: Int = 30) {
  lookup {
    space(ID: $spaceID) {
      mentionableContributors(filter: $filter, limit: $limit) {
        id
        type
        nameID
        profile {
          id
          url
          displayName
          location {
            id
            city
            country
          }
          avatar: visual(type: AVATAR) {
            ...VisualModel
          }
        }
      }
    }
  }
}
