query ForumMentionableContributors($filter: ContributorFilterInput, $limit: Int = 30) {
  platform {
    id
    forum {
      id
      mentionableContributors(filter: $filter, limit: $limit) {
        id
        type
        nameID
        profile {
          id
          url
          displayName
          location {
            id
            city
            country
          }
          avatar: visual(type: AVATAR) {
            ...VisualModel
          }
        }
      }
    }
  }
}
