query VCMemberships($virtualContributorId: UUID!) {
  lookup {
    virtualContributor(ID: $virtualContributorId) {
      id
      authorization {
        id
        myPrivileges
      }
    }
  }
  rolesVirtualContributor(rolesData: { actorID: $virtualContributorId }) {
    spaces {
      id
      subspaces {
        id
        level
      }
    }
  }
  me {
    id
    communityInvitations(states: ["invited"]) {
      ...InvitationData
    }
  }
}
