query UserSelector($first: Int!, $after: UUID, $filter: UserFilterInput) {
  usersPaginated(first: $first, after: $after, filter: $filter) {
    users {
      ...UserSelectorUserInformation
    }
    pageInfo {
      ...PageInfo
    }
  }
}

fragment UserSelectorUserInformation on User {
  id
  profile {
    id
    displayName
    location {
      id
      city
      country
    }
    visual(type: AVATAR) {
      ...VisualModel
    }
  }
}
