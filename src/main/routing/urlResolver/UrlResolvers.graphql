query UrlResolver($url: String!) {
  urlResolver(url: $url) {
    state
    ...UrlResolverResult
    closestAncestor {
      ...UrlResolverResultClosestAncestor
      url
    }
  }
}

fragment UrlResolverResult on UrlResolverQueryResults {
  type
  space {
    id
    level
    levelZeroSpaceID
    collaboration {
      id
      calloutsSet {
        id
        calloutId
        contributionId
        postId
        whiteboardId
      }
    }
    calendar {
      id
      calendarEventId
    }
    templatesSet {
      id
      templateId
    }
    parentSpaces
  }
  organizationId
  userId
  virtualContributor {
    id
    calloutsSet {
      id
      calloutId
      contributionId
      postId
      # whiteboardId  # VCs still don't have whiteboards
    }
  }
  discussionId
  innovationPack {
    id
    templatesSet {
      id
      templateId
    }
  }
  innovationHubId
}

fragment UrlResolverResultClosestAncestor on UrlResolverQueryClosestAncestor {
  type
  space {
    id
    level
    levelZeroSpaceID
  }
}
