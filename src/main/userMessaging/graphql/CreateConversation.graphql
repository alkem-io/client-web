mutation CreateConversation($conversationData: CreateConversationInput!) {
  createConversation(conversationData: $conversationData) {
    id
    room {
      id
      type
      displayName
      avatarUrl
      createdDate
      unreadCount
      messagesCount
      lastMessage {
        id
        message
        timestamp
        sender {
          id
          type
          profile {
            id
            displayName
            avatar: visual(type: AVATAR) {
              id
              uri
            }
          }
        }
        reactions {
          id
          emoji
          timestamp
          sender {
            id
            profile {
              id
              displayName
            }
          }
        }
      }
    }
    members {
      id
      type
      profile {
        id
        displayName
        url
        avatar: visual(type: AVATAR) {
          id
          uri
        }
      }
    }
  }
}
