mutation CreateConversation($conversationData: CreateConversationInput!) {
  createConversation(conversationData: $conversationData) {
    id
    room {
      id
      type
      displayName
      avatarUrl
    }
    members {
      id
      type
      profile {
        id
        displayName
        url
        avatar: visual(type: AVATAR) {
          id
          uri
        }
      }
    }
  }
}
