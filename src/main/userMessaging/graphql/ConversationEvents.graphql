subscription ConversationEvents {
  conversationEvents {
    eventType
    conversationCreated {
      conversation {
        id
        room {
          id
          displayName
          unreadCount
          messagesCount
          lastMessage {
            id
            message
            timestamp
            sender {
              id
              type
              profile {
                id
                displayName
                avatar: visual(type: AVATAR) {
                  id
                  uri
                }
              }
            }
            reactions {
              id
              emoji
              timestamp
              sender {
                id
                profile {
                  id
                  displayName
                }
              }
            }
          }
        }
        members {
          id
          type
          profile {
            id
            displayName
            url
            avatar: visual(type: AVATAR) {
              id
              uri
            }
          }
        }
      }
      message {
        id
        message
        timestamp
        sender {
          id
          type
          profile {
            id
            displayName
            avatar: visual(type: AVATAR) {
              id
              uri
            }
          }
        }
        reactions {
          id
          emoji
          timestamp
          sender {
            id
            profile {
              id
              displayName
            }
          }
        }
      }
    }
    conversationDeleted {
      conversationID
    }
    memberAdded {
      conversation {
        id
        room {
          id
          displayName
        }
        members {
          id
          type
          profile {
            id
            displayName
            url
            avatar: visual(type: AVATAR) {
              id
              uri
            }
          }
        }
      }
      addedMember {
        id
        type
        profile {
          id
          displayName
          url
          avatar: visual(type: AVATAR) {
            id
            uri
          }
        }
      }
    }
    memberRemoved {
      conversation {
        id
        members {
          id
          type
          profile {
            id
            displayName
            url
            avatar: visual(type: AVATAR) {
              id
              uri
            }
          }
        }
      }
      removedMemberID
    }
    messageReceived {
      roomId
      message {
        id
        message
        timestamp
        sender {
          id
          type
          profile {
            id
            displayName
            avatar: visual(type: AVATAR) {
              id
              uri
            }
          }
        }
        reactions {
          id
          emoji
          timestamp
          sender {
            id
            profile {
              id
              displayName
            }
          }
        }
      }
    }
    messageRemoved {
      roomId
      messageId
    }
    readReceiptUpdated {
      roomId
      lastReadEventId
    }
  }
}
