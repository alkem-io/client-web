# Innovation Hub Transfer — URL resolution, lookup, and transfer mutation
# Used by: TransferInnovationHubSection + useTransferInnovationHub hook

# Step 1: Resolve hub URL to get ID
query InnovationHubTransferUrlResolve($url: String!) {
  urlResolver(url: $url) {
    state
    type
    innovationHubId
  }
}

# Step 2: Fetch hub details for state display
query InnovationHubTransferLookup($hubId: UUID!) {
  lookup {
    innovationHub(ID: $hubId) {
      id
      about {
        profile {
          displayName
          url
        }
      }
      account {
        id
        host {
          ... on Organization {
            profile {
              displayName
            }
          }
          ... on User {
            profile {
              displayName
            }
          }
        }
      }
      authorization {
        myPrivileges
      }
    }
  }
}

# Mutation: Transfer hub to another account
mutation TransferInnovationHubToAccount($innovationHubID: UUID!, $targetAccountID: UUID!) {
  transferInnovationHubToAccount(
    transferData: { innovationHubID: $innovationHubID, targetAccountID: $targetAccountID }
  ) {
    id
  }
}
