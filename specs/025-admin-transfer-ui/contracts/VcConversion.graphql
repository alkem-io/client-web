# VC Type Conversion — URL resolution, lookup, and conversion mutation
# Used by: VcConversionSection + useVcConversion hook

# Step 1: Resolve VC URL to get ID
query VcConversionUrlResolve($url: String!) {
  urlResolver(url: $url) {
    state
    type
    virtualContributor {
      id
    }
  }
}

# Step 2: Fetch VC details for state display + conversion eligibility
query VcConversionLookup($vcId: UUID!) {
  lookup {
    virtualContributor(ID: $vcId) {
      id
      about {
        profile {
          displayName
          url
        }
      }
      aiPersona {
        bodyOfKnowledgeType
        bodyOfKnowledgeID
      }
      account {
        id
        host {
          ... on Organization {
            profile {
              displayName
            }
          }
          ... on User {
            profile {
              displayName
            }
          }
        }
      }
      authorization {
        myPrivileges
      }
    }
  }
}

# Step 3: Fetch callout count from source space (for FR-006 display)
query VcConversionSourceSpaceCallouts($spaceId: UUID!) {
  lookup {
    space(ID: $spaceId) {
      id
      about {
        profile {
          displayName
        }
      }
      collaboration {
        calloutsSet {
          callouts {
            id
          }
        }
      }
    }
  }
}

# Mutation: Convert VC from space-based to knowledge-base-based
mutation ConvertVcToKnowledgeBase($virtualContributorID: UUID!) {
  convertVirtualContributorToUseKnowledgeBase(
    conversionData: { virtualContributorID: $virtualContributorID }
  ) {
    id
  }
}
