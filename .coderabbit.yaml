language: en
early_access: false
reviews:
  high_level_summary: true
  sequence_diagrams: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  auto_review:
    enabled: true
    auto_incremental_review: true
  path_filters:
    - "!**/.*/**"            # Exclude hidden/system files/scripts
    - "!**/@types"           # Exclude types
    - "!**/public/**"        # Exclude public assets
    - "!**/node_modules/**"  # Exclude dependencies
    - "!**/dist/**"          # Exclude build files
    - "!prototype/**"        # Read-only design reference — never modified
    - "!src/crd/app/**"      # Standalone CRD preview app with mock data
  path_instructions:
    - path: "**/*"
      instructions: |
        Repository overview:
        - React 19 + TypeScript single-page app for the Alkemio platform. Uses Vite 5, Apollo Client 3, Vitest. MUI 7 + Emotion are LEGACY and FROZEN — the app is migrating to the CRD design system (shadcn/ui + Tailwind CSS, `src/crd/`). New client-facing features are built in CRD only.
        - Large surface (production build transforms ~18k modules). Core implementation lives in src/core, src/domain, and src/main; generated GraphQL hooks reside in src/core/apollo/generated.
        - Authoritative docs: README.md, docs/development-setup.md, .specify/memory/constitution.md, agents.md, .github/copilot-instructions.md.

        Environment & bootstrap:
        1. Ensure Node >=24.0.0 (Volta pins 24.14.0) and pnpm >=10.17.1.
        2. Keep .env (checked in) present; override locally via .env.local.
        3. `pnpm install` (validated 2025-10-30, ~1s with cached deps). pnpm warns about ignored build scripts (@sentry/cli, esbuild, husky, msw); ignore or run `pnpm approve-builds` if required.

        Validation flow (validated 2025-10-30):
        - `pnpm lint` → runs `tsc --noEmit` then ESLint on `src/**/*.ts(x)`; completed cleanly.
        - `pnpm vitest run --reporter=basic`.
        - `pnpm build` →Rewrites `.build/docker/.env.base` and `public/env-config.js`; revert before commit. Emits expected large-chunk warnings.
        - `pnpm serve:dev` → serves `./build` on port 3001 (after `pnpm build`).
        - `pnpm format` → Prettier for `src/**/*.ts(x)`.
        - `pnpm codegen` → requires backend GraphQL endpoint at `http://localhost:3000/graphql`; regenerates `src/core/apollo/generated` artifacts.
        - `pnpm start` → Vite dev server (app reachable via Traefik on `http://localhost:3000`, Vite listens on 3001). Regenerates `public/env-config.js` each run.

        Layout & architecture:
        - `src/index.tsx` bootstraps the SPA; `src/root.tsx` wires Sentry, Apollo, routing, auth, and global state.
        - `src/core/` houses shared infrastructure (auth, analytics, routing helpers, UI kit, utilities).
        - `src/domain/` contains domain façades/hooks grouped by business context (space, innovationHub, communication, etc.).
        - `src/main/` provides routed shells, layouts, notifications, admin flows; keep business rules in `src/domain` or `src/core`.
        - `buildConfiguration.js` injects `VITE_APP_*` env vars into `.build/docker/.env.base` and `public/env-config.js`; never commit those generated files.

        Review focus:
        - Follow the hierarchy: constitution → agents.md → .github/copilot-instructions.md.
        - Require `pnpm codegen` and schema diff summaries when `*.graphql` changes; prohibit ad-hoc `useQuery` usage.
        - Enforce React 19 concurrency hygiene, WCAG 2.1 AA accessibility, and localization via `react-i18next` (no hard-coded copy).
        - **Material UI is frozen (warning, non-blocking)**: MUI is legacy and may only be removed, never newly introduced. For any NEWLY ADDED file that imports from `@mui/*` or `@emotion/*`, leave a non-blocking comment suggesting it be built in the CRD design system (`src/crd/`) instead. Do NOT block the PR and do NOT flag `@mui/*`/`@emotion/*` imports in pre-existing files that are merely being edited — only newly added files.
        - **i18n — new strings go to CRD**: Every new user-facing string belongs in the CRD per-feature namespaces under `src/crd/i18n/<feature>/`. The legacy core file `src/core/i18n/en/translation.en.json` is FROZEN for new keys — flag (non-blocking) any PR that ADDS a new key to it and suggest moving the string to CRD. Edits to existing core keys (legacy upkeep) are fine.
        - **i18n/Crowdin (core translations only)**: The Crowdin workflow applies ONLY to the main app translations under `src/core/i18n/`. In that directory, only `src/core/i18n/en/translation.en.json` may be edited directly; all non-English files under `src/core/i18n/` are generated via Crowdin and must never be modified manually. Reject PRs that change non-English files under `src/core/i18n/`.
        - **i18n/CRD (manual translations + parity)**: Translations under `src/crd/i18n/**/*.json` are NOT managed by Crowdin. They are maintained manually (AI-assisted) per `src/crd/CLAUDE.md`; changes to any CRD locale file — including non-English ones — are expected and must pass review without Crowdin-compliance objections. All six supported languages (en, nl, es, bg, de, fr) are edited in the same PR. Enforce KEY PARITY: any key added or removed MUST be mirrored across all six language files — flag a missing or orphaned key in any locale as a blocking issue.
        - Reject commits containing build artifacts (`.build/`, `public/env-config.js`, `build/`) or missing validation evidence.
        - Ensure new env vars use the `VITE_APP_*` prefix and flow through `buildConfiguration.js` into `window._env_`.

        Trust this onboarding note first;
    - path: "specs/**/spec.md"
      instructions: |
        Speckit specs capture the constitution for behaviour. Confirm changes satisfy acceptance criteria, update impacted requirements, and flag any divergence or missing traceability.
    - path: "specs/**/plan.md"
      instructions: |
        Use the delivery plan to validate sequencing, observability, and resiliency hooks promised for a spec. Highlight unimplemented tasks or newly introduced risks.
    - path: "src/**/*.{ts,tsx,js}"
      instructions: |
        Review the React/TypeScript code for correctness and alignment with docs/code-guidelines.md.
        Rely on global error handling and logging; only flag missing local try/catch or logging when additional mitigation is required.
        Non-null assertions are discouraged except when paired with skip guards on GraphQL queries (see existing patterns).
        Watch for security issues (XSS, CSRF, sensitive data exposure) and TypeScript typing violations.
        Material UI is frozen: new client-facing features must be built in the CRD design system (`src/crd/`), not MUI. If a NEWLY ADDED file imports from `@mui/*` or `@emotion/*`, leave a non-blocking comment suggesting CRD instead — MUI may only be removed, never newly introduced. Do not flag `@mui/*`/`@emotion/*` imports in pre-existing files that are only being edited.
    - path: "src/**/*.{graphql,gql}"
      instructions: |
        Ensure documents follow generated fragment conventions, stay in sync with server schema, and include matching codegen artifacts. Flag missing schema diffs or cache update plans.
    - path: "src/**/*.json"
      instructions: |
        Validate structure, schema compliance, and absence of secrets. Keep localization payloads consistent.
    - path: "src/core/i18n/**/*.json"
      instructions: |
        Legacy, Crowdin-managed translations for the not-yet-migrated MUI app. Only `src/core/i18n/en/translation.en.json` may be edited directly, and it is FROZEN for new keys — flag (non-blocking) any PR that ADDS a new key and suggest the string be added to the CRD per-feature namespaces under `src/crd/i18n/` instead; edits to existing keys (legacy upkeep) are fine. Non-English files under this path are generated via Crowdin and must never be modified manually — flag any such edit as a policy violation.
    - path: "src/crd/i18n/**/*.json"
      instructions: |
        Manual (AI-assisted) translations per `src/crd/CLAUDE.md`. NOT managed by Crowdin. All six supported languages (en, nl, es, bg, de, fr) are edited in the same PR. Do NOT raise Crowdin-compliance objections against edits to non-English CRD locale files — that policy applies only to `src/core/i18n/`. ENFORCE KEY PARITY: every key added or removed in one `<feature>.<lang>.json` MUST be added or removed in all six language files for that feature — flag any key that is present in some locales but missing from others (a missing translation) as a blocking issue. Validate JSON structure and absence of secrets.
    - path: "public/**/*.html"
      instructions: |
        Enforce semantic HTML and accessibility requirements. Confirm injected env placeholders remain intact.
    - path: "src/**/*.yaml"
      instructions: |
        Confirm configuration accuracy and security expectations.
    - path: "**/*.md"
      instructions: |
        Ensure documentation stays current, references the constitution hierarchy, and captures new risks or mitigations.
    - path: "**/*.py"
      instructions: |
        This is a JavaScript/TypeScript repository — Python files do not belong here, anywhere.
        The upstream `prototype/` design reference ships helper scripts under `prototype/utils/*.py`
        (font merging, corruption fixes) that leak in when the prototype folder is synced.
        Flag EVERY added or modified `.py` file as a blocking issue and request its removal before merge.
        Do not review the script's logic — the only acceptable resolution is deleting the file.
chat:
  auto_reply: true
